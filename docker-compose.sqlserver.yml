services:

  gateway:
    build: ./Gateway

    container_name: nest_gateway

    volumes:
      - .:/workspace

    working_dir: /workspace/Gateway

    ports:
      - "3000:3000"

    command: npm run start:dev

    depends_on:
      - sqlserver

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest

    container_name: sqlserver_db

    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrongPass123!"

    ports:
      - "1433:1433"

  ml-service:
    build: ./ml-service

    container_name: ml_service

    ports:
      - "5000:5000"